<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>임대관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="임대관리">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
    --accent:#6c63ff;--accent2:#ff6584;--text:#e8e8f0;--text2:#888899;
    --text3:#555566;--green:#4ade80;--yellow:#fbbf24;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 20px 0;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .logo{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .month-selector{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:50px;padding:6px 14px;font-size:14px;font-weight:700;color:var(--text);border:1px solid var(--border);}
  .month-selector button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;}
  .tabs{display:flex;gap:4px;}
  .tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .content{padding:20px;}
  .section{display:none;}
  .section.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-title{font-size:15px;font-weight:700;}
  .card-subtitle{font-size:12px;color:var(--text2);margin-top:2px;}
  .tenant-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.2s,transform 0.1s;}
  .tenant-item:active{transform:scale(0.98);}
  .tenant-item:hover{border-color:var(--accent);}
  .tenant-avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;}
  .tenant-info{flex:1;min-width:0;}
  .tenant-name{font-size:15px;font-weight:700;}
  .tenant-unit{font-size:12px;color:var(--text2);margin-top:2px;}
  .tenant-total{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);text-align:right;}
  .tenant-total-label{font-size:11px;color:var(--text3);}
  .btn-add{width:100%;padding:14px;border-radius:var(--radius);border:2px dashed var(--border);background:none;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;margin-top:4px;}
  .btn-add:hover{border-color:var(--accent);color:var(--accent);}
  .bill-tenant-select{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;}
  .bill-tenant-select::-webkit-scrollbar{display:none;}
  .tenant-chip{flex-shrink:0;padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .tenant-chip.active{border-color:var(--accent);background:rgba(108,99,255,0.15);color:var(--accent);}
  .field{margin-bottom:12px;}
  .field label{font-size:12px;color:var(--text2);font-weight:700;display:block;margin-bottom:6px;letter-spacing:0.5px;}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.2s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .field select option{background:var(--surface2);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .vat-hint{font-size:11px;color:var(--accent);margin-top:4px;}
  .bill-total-box{background:linear-gradient(135deg,rgba(108,99,255,0.2),rgba(255,101,132,0.1));border:1px solid var(--accent);border-radius:var(--radius);padding:16px;margin:16px 0;text-align:center;}
  .bill-total-label{font-size:12px;color:var(--text2);margin-bottom:4px;}
  .bill-total-amount{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--accent);}
  .btn{padding:14px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--accent);color:white;width:100%;justify-content:center;}
  .btn-primary:active{background:#5a52e0;transform:scale(0.98);}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);width:100%;justify-content:center;margin-top:8px;}
  .btn-green{background:var(--green);color:#000;width:100%;justify-content:center;margin-top:8px;font-weight:900;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-size:18px;font-weight:900;margin-bottom:20px;}
  .modal-close{float:right;background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;font-size:13px;padding:10px 20px;border-radius:50px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px;font-size:10px;font-weight:700;color:var(--text3);transition:color 0.2s;}
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:22px;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .summary-card-label{font-size:11px;color:var(--text2);margin-bottom:6px;}
  .summary-card-value{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;}
  .summary-card-value.accent{color:var(--accent);}
  .summary-card-value.green{color:var(--green);}
  .empty{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-text{font-size:14px;}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;margin-left:6px;}
  .tag-new{background:rgba(108,99,255,0.2);color:var(--accent);}
  .section-label{font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 8px;letter-spacing:0.5px;}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  .water-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .water-row input{flex:1;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;}
  .water-row input:focus{outline:none;border-color:var(--accent);}
  .water-hist-item{font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .kakao-box{background:#FEE500;border-radius:var(--radius);padding:16px;color:#111;font-size:13px;line-height:1.9;white-space:pre-wrap;word-break:break-all;margin-top:12px;font-family:'Noto Sans KR',sans-serif;max-height:50vh;overflow-y:auto;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">임대<span>관리</span></div>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="currentMonth">2026년 3월</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('home')">🏠홈</div>
    <div class="tab" onclick="switchTab('tenants')">👥세입자</div>
    <div class="tab" onclick="switchTab('bill')">📄고지서</div>
    <div class="tab" onclick="switchTab('settings')">⚙️설정</div>
  </div>
</div>

<div class="content">
  <!-- HOME -->
  <div id="section-home" class="section active">
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-card-label">이번 달 총 청구액</div>
        <div class="summary-card-value accent" id="summary-total">₩0</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">세입자 수</div>
        <div class="summary-card-value green" id="summary-count">0명</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">이번 달 현황</div><div class="card-subtitle" id="home-month-label">2026년 3월</div></div>
      </div>
      <div id="home-bill-list">
        <div class="empty"><div class="empty-icon">📋</div><div class="empty-text">세입자를 추가하고 고지서를 생성해보세요</div></div>
      </div>
    </div>
  </div>

  <!-- TENANTS -->
  <div id="section-tenants" class="section">
    <div id="tenant-list"></div>
    <button class="btn-add" onclick="openAddTenant()">＋ 세입자 추가</button>
  </div>

  <!-- BILL -->
  <div id="section-bill" class="section">
    <div style="margin-bottom:16px;">
      <div class="section-label">세입자 선택</div>
      <div class="bill-tenant-select" id="bill-tenant-chips"></div>
    </div>
    <div id="bill-form-wrap">
      <div class="empty"><div class="empty-icon">👆</div><div class="empty-text">위에서 세입자를 선택하세요</div></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="section-settings" class="section">
    <div class="card">
      <div class="card-header"><div><div class="card-title">☁️ 구글 시트 동기화</div><div class="card-subtitle" id="sync-status">준비됨</div></div></div>
      <button class="btn btn-primary" onclick="syncToSheet()">☁️ 구글 시트에 저장</button>
      <button class="btn btn-secondary" onclick="syncFromSheet()">📥 구글 시트에서 불러오기</button>
    </div>
    <div class="card">
      <div class="card-header"><div><div class="card-title">📤 파일 백업/복원</div></div></div>
      <button class="btn btn-secondary" onclick="exportData()">📤 파일로 내보내기</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📥 파일 가져오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('home')" id="nav-home"><span class="nav-icon">🏠</span>홈</div>
  <div class="nav-item" onclick="switchTab('tenants')" id="nav-tenants"><span class="nav-icon">👥</span>세입자</div>
  <div class="nav-item" onclick="switchTab('bill')" id="nav-bill"><span class="nav-icon">📄</span>고지서</div>
  <div class="nav-item" onclick="switchTab('settings')" id="nav-settings"><span class="nav-icon">⚙️</span>설정</div>
</div>

<!-- Add/Edit Tenant Modal -->
<div class="modal-overlay" id="modal-tenant">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-tenant')">✕</button>
    <div class="modal-title" id="modal-tenant-title">세입자 추가</div>

    <div class="section-label">📋 기본 정보</div>
    <div class="field-row">
      <div class="field"><label>이름 (담당자)</label><input type="text" id="input-name" placeholder="홍길동"></div>
      <div class="field"><label>상호명</label><input type="text" id="input-biz" placeholder="타키 노원역점"></div>
    </div>
    <div class="field"><label>호수 / 동</label><input type="text" id="input-unit" placeholder="101호"></div>

    <hr class="divider">
    <div class="section-label">📅 계약 정보</div>
    <div class="field"><label>계약기간</label><input type="text" id="input-contract" placeholder="23/02/15 ~ 25/02/14"></div>
    <div class="field-row">
      <div class="field"><label>월납입 기준일</label><input type="text" id="input-payday" placeholder="매월 15일"></div>
      <div class="field"><label>납부방식</label>
        <select id="input-paytype"><option value="후불납">후불납</option><option value="선불납">선불납</option></select>
      </div>
    </div>
    <div class="field"><label>재계약 단위</label><input type="text" id="input-renew" placeholder="1년단위 재계약"></div>

    <hr class="divider">
    <div class="section-label">💰 월 고정 금액</div>
    <div class="field-row">
      <div class="field"><label>월세 (원)</label><input type="number" id="input-rent" placeholder="500000"></div>
      <div class="field"><label>관리비 (원)</label><input type="number" id="input-mgmt" placeholder="50000"></div>
    </div>

    <hr class="divider">
    <div class="section-label">⚡ 공용전기세 배분 설정</div>
    <div class="field">
      <label>배분 방식</label>
      <select id="input-elec-type" onchange="toggleElecFixed()">
        <option value="none">해당없음</option>
        <option value="fixed">고정금액 (부가세 별도)</option>
        <option value="remain">나머지 자동계산</option>
      </select>
    </div>
    <div class="field" id="elec-fixed-wrap" style="display:none;">
      <label>고정 공급가 (원, 부가세 제외)</label>
      <input type="number" id="input-elec-fixed" placeholder="35000">
      <div style="font-size:11px;color:var(--accent);margin-top:4px;">세입자 청구액: <span id="elec-fixed-preview">₩0</span> (부가세 포함)</div>
    </div>

    <button class="btn btn-primary" onclick="saveTenant()" style="margin-top:8px;">저장</button>
  </div>
</div>

<!-- Kakao Modal -->
<div class="modal-overlay" id="modal-receipt">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-receipt')">✕</button>
    <div class="modal-title">💬 카카오톡 고지서</div>
    <div id="kakao-msg-wrap"></div>
    <button class="btn btn-green" onclick="copyKakao()">📋 메시지 복사하기</button>
    <button class="btn btn-secondary" onclick="closeModal('modal-receipt')">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentYear = 2026, currentMonth = 3;
let tenants = JSON.parse(localStorage.getItem('tenants') || '[]');
let bills   = JSON.parse(localStorage.getItem('bills')   || '{}');
let editingTenantId = null, selectedTenantId = null;

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzZ5g7ljLVaqGSrd-BnkYAouhXjAGpiHhlbdoThlZP45nUGP-a7lvWyrxR-Qr9Cafv9/exec';

const FIELDS = [
  { key:'electricity', label:'공용전기세',        vat:true  },
  { key:'water',       label:'수도요금',          vat:false },
  { key:'waste',       label:'오물처리비',        vat:false },
  { key:'elevator',    label:'엘리베이터 운용비',  vat:true  },
];

// 납부확인 항목 (key, 표시명, 카카오 단축명)
const PAY_ITEMS = [
  { key:'pay_mgmt',  label:'관리비',       short:'월관' },
  { key:'pay_rent',  label:'월세',         short:'월세' },
  { key:'pay_elec',  label:'공용전기세',   short:'전기' },
  { key:'pay_elev',  label:'엘리베이터',   short:'엘베' },
  { key:'pay_water', label:'수도요금',     short:'수도' },
  { key:'pay_waste', label:'오물처리비',   short:'오물' },
];

const vatOf   = n => Math.round((Number(n)||0)*0.1);
const withVat = n => (Number(n)||0)+vatOf(n);
const monthKey= () => `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
const fmt     = n => '₩'+(Number(n)||0).toLocaleString();
const fmtN    = n => (Number(n)||0).toLocaleString();
const save    = () => {
  localStorage.setItem('tenants', JSON.stringify(tenants));
  localStorage.setItem('bills',   JSON.stringify(bills));
};

// ---- Sync ----
async function syncToSheet() {
  try {
    showSyncStatus('업로드 중...','loading');
    const r = await fetch(SHEET_URL,{method:'POST',body:JSON.stringify({tenants,bills})});
    const j = await r.json();
    showSyncStatus(j.status==='ok'?'저장 완료 ✓':'저장 실패 ❌', j.status==='ok'?'ok':'error');
  } catch { showSyncStatus('네트워크 오류 ❌','error'); }
}
async function syncFromSheet() {
  try {
    showSyncStatus('불러오는 중...','loading');
    const r = await fetch(SHEET_URL);
    const j = await r.json();
    if (j.status==='ok'&&j.data) {
      tenants=j.data.tenants||[]; bills=j.data.bills||{};
      save(); renderAll(); showSyncStatus('불러오기 완료 ✓','ok');
    } else showSyncStatus('불러오기 실패 ❌','error');
  } catch { showSyncStatus('네트워크 오류 ❌','error'); }
}
function showSyncStatus(msg,type) {
  const el=document.getElementById('sync-status'); if(!el) return;
  el.textContent=msg;
  el.style.color=type==='ok'?'var(--green)':type==='error'?'var(--accent2)':'var(--text2)';
}

// ---- Export/Import ----
function exportData() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({tenants,bills},null,2)],{type:'application/json'}));
  a.download=`임대관리_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('내보내기 완료! ✓');
}
function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if(!d.tenants||!d.bills) throw 0;
      if(!confirm('현재 데이터가 덮어씌워져요! 계속할까요?')) return;
      tenants=d.tenants; bills=d.bills; save(); renderAll(); showToast('가져오기 완료! ✓');
    } catch { showToast('파일이 올바르지 않아요 ❌'); }
  };
  r.readAsText(file); e.target.value='';
}

// ---- Month ----
function changeMonth(d) {
  currentMonth+=d;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  if(currentMonth<1){currentMonth=12;currentYear--;}
  document.getElementById('currentMonth').textContent=`${currentYear}년 ${currentMonth}월`;
  document.getElementById('home-month-label').textContent=`${currentYear}년 ${currentMonth}월`;
  renderAll();
}

// ---- Tabs ----
function switchTab(tab) {
  ['home','tenants','bill','settings'].forEach(t=>{
    document.getElementById(`section-${t}`).classList.toggle('active',t===tab);
    document.querySelector(`.tabs .tab:nth-child(${['home','tenants','bill','settings'].indexOf(t)+1})`).classList.toggle('active',t===tab);
    document.getElementById(`nav-${t}`).classList.toggle('active',t===tab);
  });
  if(tab==='bill') renderBillChips();
}

function renderAll() { renderHome(); renderTenants(); if(selectedTenantId) renderBillForm(); renderBillChips(); }

// ---- Home ----
function calcSaved(t,b) {
  return withVat(Number(b.rent??t.rent)||0)
       + withVat(Number(b.mgmt??t.mgmt)||0)
       + FIELDS.reduce((s,f)=>{ const v=Number(b[f.key])||0; return s+(f.vat?withVat(v):v); },0);
}
function renderHome() {
  const mk=monthKey(); let total=0,html='';
  tenants.forEach(t=>{
    const b=(bills[mk]||{})[t.id]||{};
    const sum=calcSaved(t,b); total+=sum;
    const hasData=Object.keys(b).length>0;
    html+=`<div class="tenant-item" onclick="switchTab('bill');setTimeout(()=>selectBillTenant('${t.id}'),50)">
      <div class="tenant-avatar">${(t.biz||t.name)[0]}</div>
      <div class="tenant-info">
        <div class="tenant-name">${t.biz||t.name}${!hasData?'<span class="tag tag-new">미입력</span>':''}</div>
        <div class="tenant-unit">${t.name} · ${t.unit}</div>
      </div>
      <div class="tenant-total"><div class="tenant-total-label">청구액</div><div>${fmt(sum)}</div></div>
    </div>`;
  });
  document.getElementById('home-bill-list').innerHTML=tenants.length?html:
    `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">세입자를 추가하고 고지서를 생성해보세요</div></div>`;
  document.getElementById('summary-total').textContent=fmt(total);
  document.getElementById('summary-count').textContent=tenants.length+'명';
}

// ---- Tenants ----
function renderTenants() {
  const el=document.getElementById('tenant-list');
  if(!tenants.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">아직 세입자가 없어요</div></div>`; return; }
  el.innerHTML=tenants.map(t=>`
    <div class="tenant-item">
      <div class="tenant-avatar">${(t.biz||t.name)[0]}</div>
      <div class="tenant-info">
        <div class="tenant-name">${t.biz||t.name}</div>
        <div class="tenant-unit">${t.name} · ${t.unit}${t.contract?' · '+t.contract:''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="editTenant('${t.id}')" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;">수정</button>
        <button onclick="deleteTenant('${t.id}')" style="background:rgba(255,101,132,0.15);border:1px solid rgba(255,101,132,0.3);color:var(--accent2);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;">삭제</button>
      </div>
    </div>`).join('');
}

function toggleElecFixed() {
  const type = document.getElementById('input-elec-type').value;
  document.getElementById('elec-fixed-wrap').style.display = type === 'fixed' ? 'block' : 'none';
}

// ---- Add/Edit Tenant ----
function openAddTenant() {
  editingTenantId=null;
  document.getElementById('modal-tenant-title').textContent='세입자 추가';
  ['name','biz','unit','contract','payday','renew','rent','mgmt','elec-fixed'].forEach(f=>{
    const el=document.getElementById('input-'+f); if(el) el.value=f==='renew'?'1년단위 재계약':'';
  });
  document.getElementById('input-paytype').value='후불납';
  document.getElementById('input-elec-type').value='none';
  document.getElementById('elec-fixed-wrap').style.display='none';
  openModal('modal-tenant');
}
function editTenant(id) {
  const t=tenants.find(x=>x.id===id); editingTenantId=id;
  document.getElementById('modal-tenant-title').textContent='세입자 수정';
  ['name','biz','unit','contract','payday','renew','rent','mgmt'].forEach(f=>{
    const el=document.getElementById('input-'+f); if(el) el.value=t[f]||'';
  });
  document.getElementById('input-paytype').value=t.paytype||'후불납';
  document.getElementById('input-elec-type').value=t.elecType||'none';
  document.getElementById('input-elec-fixed').value=t.elecFixed||'';
  document.getElementById('elec-fixed-wrap').style.display=t.elecType==='fixed'?'block':'none';
  openModal('modal-tenant');
}
function saveTenant() {
  const name=document.getElementById('input-name').value.trim();
  const unit=document.getElementById('input-unit').value.trim();
  if(!name||!unit){showToast('이름과 호수를 입력해주세요');return;}
  const data={name,unit,
    biz:document.getElementById('input-biz').value.trim(),
    contract:document.getElementById('input-contract').value.trim(),
    payday:document.getElementById('input-payday').value.trim(),
    paytype:document.getElementById('input-paytype').value,
    renew:document.getElementById('input-renew').value.trim(),
    rent:document.getElementById('input-rent').value,
    mgmt:document.getElementById('input-mgmt').value,
    elecType:document.getElementById('input-elec-type').value,
    elecFixed:document.getElementById('input-elec-fixed').value,
  };
  if(editingTenantId) Object.assign(tenants.find(x=>x.id===editingTenantId),data);
  else tenants.push({id:Date.now().toString(),...data});
  save(); closeModal('modal-tenant'); renderAll();
  showToast(editingTenantId?'수정되었습니다':'세입자가 추가되었습니다');
}
function deleteTenant(id) {
  if(!confirm('세입자를 삭제할까요?')) return;
  tenants=tenants.filter(x=>x.id!==id); save(); renderAll(); showToast('삭제되었습니다');
}

// ---- Bill ----
function renderBillChips() {
  const el=document.getElementById('bill-tenant-chips');
  if(!tenants.length){el.innerHTML=`<div style="color:var(--text3);font-size:13px;padding:8px 0;">세입자를 먼저 추가해주세요</div>`;return;}
  el.innerHTML=tenants.map(t=>`<div class="tenant-chip ${selectedTenantId===t.id?'active':''}" onclick="selectBillTenant('${t.id}')">${t.biz||t.name}</div>`).join('');
}
function selectBillTenant(id) { selectedTenantId=id; renderBillChips(); renderBillForm(); }

function renderBillForm() {
  const t=tenants.find(x=>x.id===selectedTenantId); if(!t) return;
  const mk=monthKey();
  const b=((bills[mk]||{})[t.id])||{};
  const rentVal=Number(b.rent??t.rent)||0;
  const mgmtVal=Number(b.mgmt??t.mgmt)||0;

  // 수도 이력 (최근 4개)
  const wh=(t.waterHistory||[]).slice(-4);
  let wHistHtml=wh.length?wh.map((w,i)=>`
    <div class="water-hist-item">
      <span>${w.date} · <strong>${fmtN(w.val)}</strong></span>
      ${i>0?`<span style="color:var(--green);font-weight:700;">+${fmtN(w.val-wh[i-1].val)} 톤</span>`:'<span style="color:var(--text3);">기준</span>'}
    </div>`).join(''):'<div style="font-size:12px;color:var(--text3);padding:4px 0;">이력 없음</div>';

  let fieldsHtml='';
  FIELDS.forEach(f=>{
    const val=Number(b[f.key])||0;
    fieldsHtml+=`<div class="field">
      <label>${f.label}</label>
      <input type="number" id="bill-${f.key}" placeholder="0" value="${val||''}" oninput="updateBillTotal()">
      ${f.vat?`<div class="vat-hint">부가세: <span id="vat-${f.key}">${fmt(vatOf(val))}</span></div>`:''}
    </div>`;
  });

  document.getElementById('bill-form-wrap').innerHTML=`
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">${t.biz||t.name} · ${t.unit}</div>
        <div class="card-subtitle">${currentYear}년 ${currentMonth}월 고지서</div></div>
      </div>

      <div class="section-label">💧 수도계량기 이력</div>
      ${wHistHtml}
      <div class="water-row" style="margin-top:10px;">
        <input type="number" id="bill-water-meter" placeholder="이번 달 수치 입력" value="${b.waterMeter||''}">
        <button onclick="saveWaterMeter()" style="background:var(--accent);border:none;color:white;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">기록</button>
      </div>

      <hr class="divider">
      <div class="section-label">💰 월 고정금액</div>
      <div class="field-row">
        <div class="field">
          <label>월세</label>
          <input type="number" id="bill-rent" value="${rentVal||''}" oninput="updateBillTotal()">
          <div class="vat-hint">부가세: <span id="vat-rent">${fmt(vatOf(rentVal))}</span></div>
        </div>
        <div class="field">
          <label>관리비</label>
          <input type="number" id="bill-mgmt" value="${mgmtVal||''}" oninput="updateBillTotal()">
          <div class="vat-hint">부가세: <span id="vat-mgmt">${fmt(vatOf(mgmtVal))}</span></div>
        </div>
      </div>

      <hr class="divider">
      <div class="section-label">📊 이번 달 변동금액</div>
      <div class="field">
        <label>공용전기세 총액 입력 (원, 부가세 제외)</label>
        <input type="number" id="bill-elec-total" placeholder="0" value="${b.elecTotal||''}"
          oninput="calcElecDist()" style="margin-bottom:6px;">
        ${t.elecType==='fixed'?`<div style="font-size:12px;color:var(--accent);padding:8px;background:rgba(108,99,255,0.1);border-radius:8px;">
          ⚡ 배분: 고정 ${fmtN(t.elecFixed)}원 + 부가세 → <strong>${fmtN(withVat(Number(t.elecFixed)))}원</strong> 청구
        </div>`:''}
        ${t.elecType==='remain'?`<div id="elec-remain-hint" style="font-size:12px;color:var(--green);padding:8px;background:rgba(74,222,128,0.1);border-radius:8px;">
          ⚡ 나머지 자동계산 대기중
        </div>`:''}
      </div>
      <div class="field-row">${fieldsHtml}</div>

      <div class="bill-total-box">
        <div class="bill-total-label">이번 달 총 청구액 (부가세 포함)</div>
        <div class="bill-total-amount" id="bill-total-display">${fmt(calcFromInput(t,b))}</div>
      </div>
      <button class="btn btn-primary" onclick="saveBill()">💾 저장</button>
      <button class="btn btn-green" onclick="previewKakao()">💬 카카오톡 메시지 생성</button>

      <hr class="divider">
      <div class="section-label">✅ 납부 확인</div>
      <div id="pay-check-wrap">${renderPayChecks(t, b)}</div>
    </div>`;
}

function calcElecDist() {
  const totalEl = document.getElementById('bill-elec-total');
  if (!totalEl) return;
  const totalRaw = Number(totalEl.value) || 0;

  // 고정금액 세입자들의 합산
  const fixedSum = tenants.reduce((s, t) => {
    return s + (t.elecType === 'fixed' ? (Number(t.elecFixed)||0) : 0);
  }, 0);

  const currentTenant = tenants.find(x=>x.id===selectedTenantId);
  if (!currentTenant) return;

  if (currentTenant.elecType === 'fixed') {
    // 고정금액 세입자: 저장된 고정값 그대로
    const el = document.getElementById('bill-electricity');
    if (el) el.value = currentTenant.elecFixed || 0;
  } else if (currentTenant.elecType === 'remain') {
    // 나머지 세입자: 총액 - 고정합산
    const remain = totalRaw - fixedSum;
    const el = document.getElementById('bill-electricity');
    if (el) el.value = remain > 0 ? remain : 0;
    const hint = document.getElementById('elec-remain-hint');
    if (hint) hint.innerHTML = `⚡ 나머지: ${fmtN(totalRaw)} - ${fmtN(fixedSum)} = <strong>${fmtN(remain)}원</strong> + 부가세 → <strong>${fmtN(withVat(remain))}원</strong> 청구`;
  }
  updateBillTotal();
}

function saveWaterMeter() {
  const t=tenants.find(x=>x.id===selectedTenantId); if(!t) return;
  const val=document.getElementById('bill-water-meter')?.value;
  if(!val){showToast('수치를 입력해주세요');return;}
  const mk=monthKey();
  const date=`${String(currentMonth).padStart(2,'0')}/20`;
  if(!t.waterHistory) t.waterHistory=[];
  const idx=t.waterHistory.findIndex(w=>w.mk===mk);
  if(idx>=0) t.waterHistory[idx]={mk,date,val:Number(val)};
  else t.waterHistory.push({mk,date,val:Number(val)});
  if(t.waterHistory.length>12) t.waterHistory=t.waterHistory.slice(-12);
  save(); renderBillForm(); showToast('계량기 수치 저장 ✓');
}

function calcFromInput(t,b) {
  const rent=withVat(Number(document.getElementById('bill-rent')?.value??b.rent??t.rent)||0);
  const mgmt=withVat(Number(document.getElementById('bill-mgmt')?.value??b.mgmt??t.mgmt)||0);
  const extras=FIELDS.reduce((s,f)=>{
    const v=Number(document.getElementById('bill-'+f.key)?.value??b[f.key])||0;
    return s+(f.vat?withVat(v):v);
  },0);
  return rent+mgmt+extras;
}

function updateBillTotal() {
  ['rent','mgmt'].forEach(k=>{
    const v=Number(document.getElementById('bill-'+k)?.value)||0;
    const el=document.getElementById('vat-'+k); if(el) el.textContent=fmt(vatOf(v));
  });
  FIELDS.forEach(f=>{
    if(!f.vat) return;
    const v=Number(document.getElementById('bill-'+f.key)?.value)||0;
    const el=document.getElementById('vat-'+f.key); if(el) el.textContent=fmt(vatOf(v));
  });
  const t=tenants.find(x=>x.id===selectedTenantId); if(!t) return;
  const el=document.getElementById('bill-total-display'); if(el) el.textContent=fmt(calcFromInput(t,{}));
}

function saveBill() {
  const mk=monthKey(); if(!bills[mk]) bills[mk]={};
  const data={};
  FIELDS.forEach(f=>data[f.key]=document.getElementById('bill-'+f.key)?.value||0);
  data.rent=document.getElementById('bill-rent')?.value||0;
  data.mgmt=document.getElementById('bill-mgmt')?.value||0;
  data.waterMeter=document.getElementById('bill-water-meter')?.value||0;
  data.elecTotal=document.getElementById('bill-elec-total')?.value||0;
  // 기존 paid 데이터 유지
  if(bills[mk][selectedTenantId]?.paid) data.paid=bills[mk][selectedTenantId].paid;
  bills[mk][selectedTenantId]=data;
  save(); renderHome(); showToast('저장되었습니다 ✓');
}

// ---- Kakao ----
function previewKakao() {
  const t=tenants.find(x=>x.id===selectedTenantId); if(!t) return;
  const mk=monthKey();
  const b=(bills[mk]||{})[t.id]||{};
  const rent=Number(document.getElementById('bill-rent')?.value??b.rent??t.rent)||0;
  const mgmt=Number(document.getElementById('bill-mgmt')?.value??b.mgmt??t.mgmt)||0;
  const lastDay=new Date(currentYear,currentMonth,0).getDate();
  const mm=String(currentMonth).padStart(2,'0');

  // 수도 이력 4개
  const wh=(t.waterHistory||[]).slice(-4);
  let waterLines=wh.map(w=>`\n${w.date} 수도계량기 : ${fmtN(w.val)}`).join('');

  // 금액 항목
  let billLines='';
  if(mgmt) billLines+=`\n${currentMonth}월 관리비 : ${fmtN(withVat(mgmt))}원`;
  if(rent)  billLines+=`\n${currentMonth}월 월세 : ${fmtN(withVat(rent))}원`;
  FIELDS.forEach(f=>{
    const v=Number(document.getElementById('bill-'+f.key)?.value??b[f.key])||0;
    if(!v) return;
    billLines+=`\n${currentMonth}월 ${f.label} : ${fmtN(f.vat?withVat(v):v)}원`;
  });

  const total=calcFromInput(t,b);

  // 납부확인 라인
  const paid = b.paid || {};
  let paidLines = '';
  PAY_ITEMS.forEach(item => {
    const p = paid[item.key] || {};
    if (p.date) {
      paidLines += `\n${currentMonth}월 ${item.short} (${p.period||''}) ${p.date} 입금확인하였습니다`;
    }
  });

  const msg=
`안녕하세요, [${t.biz||t.name}/${t.name}] 사장님.
${currentYear}년도 ${mm}월 (${mm}/${lastDay}) 세금계산서 발급하였습니다.
기타 내용 전달드립니다. 확인후 입금해주세요~
-------------------------
계약기간 : ${t.contract||''}
월납입 기준일 : ${t.payday||''} (${t.renew||''} / ${t.paytype||''})
※ 재계약서 작성 : 매 년 기준일 1개월 전 / 넘어가면 묵시적 연장
-------------------------${waterLines}
-------------------------${billLines}
-------------------------${paidLines}
-------------------------`;

  document.getElementById('kakao-msg-wrap').innerHTML=
    `<div class="kakao-box" id="kakao-text">${msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  openModal('modal-receipt');
}

function renderPayChecks(t, b) {
  const paid = b.paid || {};
  return PAY_ITEMS.map(item => {
    const p = paid[item.key] || {};
    const period = p.period || '';
    const date   = p.date   || '';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;">${item.label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">사용기간</div>
          <input type="text" placeholder="01/15~02/14" value="${period}"
            onchange="updatePay('${item.key}','period',this.value)"
            style="width:100%;padding:8px 10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">입금확인일</div>
          <input type="text" placeholder="02/24" value="${date}"
            onchange="updatePay('${item.key}','date',this.value)"
            style="width:100%;padding:8px 10px;background:var(--surface2);border:1.5px solid ${date?'var(--green)':'var(--border)'};border-radius:8px;color:${date?'var(--green)':'var(--text)'};font-size:13px;font-family:'DM Mono',monospace;">
        </div>
      </div>
    </div>`;
  }).join('');
}

function updatePay(itemKey, field, value) {
  const mk = monthKey();
  if (!bills[mk]) bills[mk] = {};
  if (!bills[mk][selectedTenantId]) bills[mk][selectedTenantId] = {};
  const b = bills[mk][selectedTenantId];
  if (!b.paid) b.paid = {};
  if (!b.paid[itemKey]) b.paid[itemKey] = {};
  b.paid[itemKey][field] = value;
  save();
}

function copyKakao() {
  const el=document.getElementById('kakao-text'); if(!el) return;
  const text=el.innerText;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>showToast('복사됐어요! 카카오톡에 붙여넣기 📋'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('복사됐어요! 카카오톡에 붙여넣기 📋');
  }
}

// ---- Modal ----
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});
});

// ---- Toast ----
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ---- Init ----
renderAll();

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').style.display='none';
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});
  }
}
